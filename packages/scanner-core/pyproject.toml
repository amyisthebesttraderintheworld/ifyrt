[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ifyrt-scanner-core"
version = "0.1.0"
description = "Market data, execution, risk, and strategy scanning for Ifyrt"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.104.0",
  "uvicorn[standard]>=0.24.0",
  "pydantic>=2.5.0",
  "pydantic-settings>=2.1.0",
  "aiohttp>=3.9.0",
  "asyncpg>=0.29.0",
  "numpy>=1.24.0",
  "pandas>=2.1.0",
  "python-dateutil>=2.8.0"
]

[project.optional-dependencies]
dev = [
  "pytest>=7.4.0",
  "pytest-asyncio>=0.21.0",
  "ruff>=0.1.0",
  "mypy>=1.7.0"
]

[tool.hatch.build.targets.wheel]
packages = ["src/ifyrt_scanner"]
